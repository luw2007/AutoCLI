site: trae-cn
name: projects
description: 查询所有 Trae CN 项目窗口及对应的 CDP page_id
browser: false

args:
  port:
    type: int
    default: 9222
    description: CDP 调试端口

columns: [Index, Project, PageId, Title, Endpoint]

pipeline:
  - fetch: "http://localhost:${{ args.port }}/json/list"
  - filter: "${{ item.type == 'page' }}"
  - map:
      Index: "${{ index + 1 }}"
      Project: "${{ item.title | split(' — ') | last }}"
      PageId: "${{ item.id }}"
      Title: "${{ item.title }}"
      Endpoint: "ws://localhost:${{ args.port }}/devtools/page/${{ item.id }}"
